apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-cloud-armor-advanced-network-ddos-protection-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Enable Cloud Armor Advanced Network DDoS Protection
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-cloud-armor.git
      sourceType: git
      dir: /modules/advanced-network-ddos-protection
  ui:
    input:
      variables:
        ddos_protection_config:
          name: ddos_protection_config
          title: Ddos Protection Config
        network_edge_security_service_description:
          name: network_edge_security_service_description
          title: Network Edge Security Service Description
        network_edge_security_service_name:
          name: network_edge_security_service_name
          title: Network Edge Security Service Name
        policy_description:
          name: policy_description
          title: Policy Description
        policy_name:
          name: policy_name
          title: Policy Name
        project_id:
          name: project_id
          title: Project Id
        regions:
          name: regions
          title: Regions
