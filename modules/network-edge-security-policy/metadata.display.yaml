apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-cloud-armor-network-edge-security-policy-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Cloud Armor Terraform Module for Network Edge Security Policy
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-cloud-armor.git
      sourceType: git
      dir: /modules/network-edge-security-policy
  ui:
    input:
      variables:
        policy_description:
          name: policy_description
          title: Policy Description
        policy_name:
          name: policy_name
          title: Policy Name
        policy_rules:
          name: policy_rules
          title: Policy Rules
        policy_user_defined_fields:
          name: policy_user_defined_fields
          title: Policy User Defined Fields
        project_id:
          name: project_id
          title: Project Id
        region:
          name: region
          title: Region
